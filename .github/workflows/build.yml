name: Build & Release

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 构建前端
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.node-version

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        # VITE_API_URL 为空 → 前端用相对路径请求，后端同端口直接响应
        run: VITE_API_URL="" pnpm build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2: 构建 Go 二进制（5 平台）
  # ──────────────────────────────────────────────
  build-binary:
    name: Build Binary (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: build-frontend
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: backend/go.mod

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          # 放到 backend/internal/static/dist，供 go:embed 使用
          path: backend/internal/static/dist

      - name: Get version
        id: ver
        run: |
          VERSION=$(node -e "process.stdout.write(require('./frontend/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go mod download
          go build \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o sub-store-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: backend/sub-store-${{ matrix.suffix }}${{ matrix.ext || '' }}
          retention-days: 7

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binary]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-bins/
          merge-multiple: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Package frontend dist zip
        run: zip -r dist.zip dist/

      - name: Checksum
        run: |
          cd release-bins
          sha256sum * > ../checksums.txt
          cat ../checksums.txt

      - name: Get tag
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test
          name: Sub-Store test
          generate_release_notes: true
          files: |
            release-bins/*
            dist.zip
            checksums.txt
